---
- name: Install Clickhouse
  hosts: clickhouse
  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
  tasks:
    - name: Determine architecture for common-static
      ansible.builtin.set_fact:
        clickhouse_arch: "{{ 'aarch64' if ansible_architecture == 'aarch64' else 'x86_64' }}"
    - name: Get clickhouse distrib
      ansible.builtin.get_url:
        url: >-
          https://packages.clickhouse.com/rpm/stable/{{ item }}-{{ clickhouse_version }}.{{
          'noarch' if item != 'clickhouse-common-static' else clickhouse_arch }}.rpm
        dest: "./{{ item }}-{{ clickhouse_version }}.rpm"
        mode: '0644'
      loop: "{{ clickhouse_packages }}"
    - name: Install clickhouse packages
      become: true
      ansible.builtin.yum:
        name:
          - clickhouse-common-static-{{ clickhouse_version }}.rpm
          - clickhouse-client-{{ clickhouse_version }}.rpm
          - clickhouse-server-{{ clickhouse_version }}.rpm
      notify: Start clickhouse service
    - name: Flush handlers
      ansible.builtin.meta: flush_handlers
    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install Vector
  hosts: vector
  become: true

- name: Установка Lighthouse
  hosts: lighthouse
  become: true
